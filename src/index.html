  <script>
    // Script loading system
    let scriptsLoaded = 0;
    const totalScripts = 2; // anime.js and gsap.js
    
    function loadScript(src, callback) {
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = callback || function() {};
      script.onerror = function() {
        console.error(`❌ [SCRIPT LOADER] Failed to load: ${src}`);
      };
      document.head.appendChild(script);
      console.log(`🔄 [SCRIPT LOADER] Loading: ${src}`);
    }
    
    function checkAllScriptsLoaded() {
      scriptsLoaded++;
      console.log(`🔄 [SCRIPT LOADER] Scripts loaded: ${scriptsLoaded}/${totalScripts}`);
      if (scriptsLoaded === totalScripts) {
        console.log('✅ [SCRIPT LOADER] All dependencies loaded, loading main script...');
        // All dependencies loaded, now load main script
        loadScript('js/main.js');
      }
    }
    
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🔄 [HTML] DOMContentLoaded event fired, starting script loading...');
      // Load only publicly available scripts with cache busting
      // Antes:
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js', checkAllScriptsLoaded);
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js', checkAllScriptsLoaded);
      
      // Ahora:
      const timestamp = Date.now();
      loadScript(`https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js?v=${timestamp}`, checkAllScriptsLoaded);
      loadScript(`https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js?v=${timestamp}`, checkAllScriptsLoaded);
    });
  </script>
